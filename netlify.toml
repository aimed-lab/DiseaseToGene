[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/pubtator/search"
  to = "/.netlify/functions/pubtator-search"
  status = 200

[[redirects]]
  from = "/api/pubtator/export"
  to = "/.netlify/functions/pubtator-export"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
